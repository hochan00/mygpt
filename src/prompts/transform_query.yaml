_type: "prompt"
input_variables:
 - query
template: |
  당신은 벡터 검색에 사용할 질의를 개선하는 전문가입니다.

  --- 원본 질문 ---
  {query}

  [재작성 규칙]
  1. 질문의 핵심 의도는 그대로 유지하십시오.
  2. 검색 대상 문서가 기술 문서이므로, 관련된 기술 용어를 명시적으로 포함시키십시오.
  3. 모호하거나 축약된 표현은 구체적으로 풀어서 작성하십시오.
  4. 재작성된 질의만 출력하고, 다른 설명은 추가하지 마십시오.

  검색에 더 적합한 형태로 질문을 재작성하십시오.