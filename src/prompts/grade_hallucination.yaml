_type: "prompt"
input_variables:
  - context
  - generation
template: |
  당신은 생성된 답변이 참고 문서 내용에 근거하는지 판단하는 평가자입니다.

  --- 참고 문서 ---
  {context}

  --- 생성된 답변 ---
  {generation}

  [판단 기준]
  1. 답변에 포함된 내용 중 하나라도 참고 문서에서 확인할 수 없다면, 근거가 없다고(false) 판단하십시오.
  2. 답변의 모든 주장이 참고 문서 내용으로 뒷받침된다면, 근거가 있다고(true) 판단하십시오.
  3. 문서에 없는 내용을 답변이 추측하거나 지어낸 경우도 근거 없음(false)으로 간주하십시오.

  위 기준에 따라 이 답변이 문서에 근거하는지 판단하십시오.